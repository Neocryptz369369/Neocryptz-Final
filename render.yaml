services:
  - type: web
    name: neocryptz-ai
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        value: https://bxzvxgjnlvbexeuocbey.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NODE_ENV
        value: production
